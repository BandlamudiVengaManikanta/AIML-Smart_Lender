<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}Smart Lender{% endblock %}</title>
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,500;8..60,600;8..60,700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet">
</head>
<body>
<header class="site-header">
  <div class="wrap header-inner">
    <a href="{{ url_for('home') }}" class="brand">
      <span class="brand-mark">SL</span>
      <span class="brand-name">Smart&nbsp;Lender</span>
    </a>
    <nav class="site-nav">
      <a href="{{ url_for('home') }}">Home</a>
      <a href="{{ url_for('predict') }}">Check Eligibility</a>
      <a href="{{ url_for('dashboard') }}">Model Insights</a>
      <a href="{{ url_for('about') }}">About</a>
    </nav>
  </div>
</header>

<main>
  {% block content %}{% endblock %}
</main>

<footer class="site-footer">
  <div class="wrap footer-inner">
    <div>
      <span class="brand-mark small">SL</span>
      <span>Smart Lender &mdash; ML-powered loan eligibility assessment</span>
    </div>
    <div class="footer-note">Decision Tree &middot; Random Forest &middot; KNN &middot; XGBoost</div>
  </div>
</footer>
</body>
</html>
